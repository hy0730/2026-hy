<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>안양의 시간 : 인터랙티브 맵 모듈</title>
    <!-- 레트로 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --retro-bg: #8d6e63;
            --retro-dark: #3e2723;
            --retro-light: #fdfcf8;
            --retro-gold: #ffca28;
            --retro-red: #d32f2f;
            --retro-gray: #9e9e9e;
        }

        body {
            font-family: 'DungGeunMo', sans-serif;
            background-color: #222;
            margin: 0;
            padding: 0;
        }

        /* ==================================================================
           [재사용 가능한 인터랙티브 맵 컴포넌트 핵심 스타일]
           ================================================================== */
        .interactive-map-container {
            position: relative;
            width: 100%;
            /* 지도의 비율에 맞게 높이 설정 (안양시 지도는 대략 1:1.2 비율) */
            padding-top: 110%; 
            background-color: #eefebe;
            border: 6px solid var(--retro-dark);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.5);
        }

        .map-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.85;
            filter: sepia(0.5) contrast(1.1) brightness(0.9); /* 고지도 느낌 부여 */
        }

        /* 맵 핀 (유물 미니어처) 공통 스타일 */
        .map-pin {
            position: absolute;
            /* 좌표(x,y)가 핀의 하단 중앙을 가리키도록 설정 */
            transform: translate(-50%, -100%); 
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .map-pin .pin-img-box {
            width: 64px;
            height: 64px;
            background-color: var(--retro-light);
            border: 4px solid var(--retro-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 6px 0 rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .map-pin img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transition: filter 0.3s;
        }

        /* 맵 핀 라벨 */
        .map-pin .pin-label {
            background-color: var(--retro-dark);
            color: var(--retro-gold);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: -10px; /* 이미지 박스에 살짝 걸치게 */
            z-index: 2;
            border: 2px solid var(--retro-light);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            white-space: nowrap;
            pointer-events: none;
        }

        /* ==================================================================
           [상태 1] Cleared (탐험 완료) - 회색 처리
           ================================================================== */
        .map-pin.cleared .pin-img-box {
            background-color: #bdbdbd;
            border-color: #616161;
            box-shadow: 1px 3px 0 rgba(0,0,0,0.3);
        }
        .map-pin.cleared img {
            /* 완전히 회색으로 만들고 살짝 투명하게 */
            filter: grayscale(100%) opacity(0.7); 
        }
        .map-pin.cleared .pin-label {
            background-color: #616161;
            color: #eeeeee;
            border-color: #bdbdbd;
        }
        .map-pin.cleared:hover {
            cursor: pointer;
            transform: translate(-50%, -105%) scale(1.05);
            z-index: 15;
        }

        /* ==================================================================
           [상태 2] Active (현재 탐험 가능) - 풀컬러 및 통통 튀는 애니메이션
           ================================================================== */
        .map-pin.active {
            z-index: 20;
            cursor: pointer;
            animation: bounce-pin 1.5s infinite;
        }
        .map-pin.active .pin-img-box {
            border-color: var(--retro-red);
            background-color: #fff;
            box-shadow: 0 0 20px rgba(211, 47, 47, 0.8), 2px 6px 0 rgba(0,0,0,0.4);
        }
        .map-pin.active img {
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        .map-pin.active .pin-label {
            background-color: var(--retro-red);
            color: #fff;
            border-color: #fff;
        }

        /* ==================================================================
           [상태 3] Locked (미해금) - 실루엣 및 비활성화
           ================================================================== */
        .map-pin.locked {
            opacity: 0.8;
            cursor: not-allowed;
            z-index: 5;
        }
        .map-pin.locked .pin-img-box {
            background-color: #5d4037;
            border-color: #3e2723;
            box-shadow: 1px 2px 0 rgba(0,0,0,0.5);
        }
        .map-pin.locked img {
            /* 이미지를 완전한 까만 실루엣으로 변경 */
            filter: brightness(0) invert(0.2); 
        }
        .map-pin.locked .pin-label {
            background-color: #3e2723;
            color: #8d6e63;
            border-color: #5d4037;
        }

        /* 바운스 애니메이션 */
        @keyframes bounce-pin {
            0%, 100% { transform: translate(-50%, -100%); }
            50% { transform: translate(-50%, -115%); }
        }
    </style>
</head>
<body class="select-none overflow-hidden">
    <div class="relative w-full h-screen max-w-[800px] mx-auto bg-[#4e342e] overflow-hidden border-x-4 border-black shadow-2xl flex flex-col">
        
        <!-- 테스트용 헤더 -->
        <header class="bg-[#3e2723] border-b-4 border-[#1a0f0d] p-4 text-center z-10 shadow-md flex-shrink-0">
            <h1 class="text-2xl text-[#ffca28] drop-shadow-md mb-1 font-bold">🗺️ 인터랙티브 맵 테스트</h1>
            <p class="text-xs text-[#d7ccc8]">3가지 상태(완료/진행중/잠김)를 확인해보세요.</p>
        </header>

        <!-- 메인 컨텐츠 영역 (인터랙티브 맵) -->
        <main class="flex-1 overflow-y-auto p-4 relative">
            
            <!-- 맵 컨테이너 -->
            <div class="interactive-map-container" id="interactive-map">
                <!-- 베이스 지도 이미지 (업로드된 안양 지도) -->
                <img src="images/yanyangmap.jpg" alt="안양시 지도" class="map-background">
                <!-- 하단 스크립트를 통해 핀이 생성됩니다 -->
            </div>

            <!-- 범례 (Legend) -->
            <div class="mt-6 flex justify-center gap-6 text-sm text-[#fdfcf8] font-bold bg-[#3e2723] p-3 rounded-lg border-2 border-[#1a0f0d]">
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 bg-[#bdbdbd] border-2 border-[#616161] rounded-full"></span>탐험 완료
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 bg-[#d32f2f] border-2 border-[#fff] rounded-full animate-pulse"></span>조사 가능
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 bg-[#5d4037] border-2 border-[#3e2723] rounded-full"></span>미발견
                </div>
            </div>
            
            <!-- 테스트용 컨트롤러 -->
            <div class="mt-4 text-center">
                <button onclick="testAdvanceStage()" class="bg-[#ffca28] text-[#3e2723] px-4 py-2 rounded font-bold border-2 border-[#3e2723] shadow-[2px_2px_0_#000] active:translate-y-1 active:shadow-none transition-all">
                    ▶ 다음 스테이지 해금 테스트
                </button>
            </div>
        </main>
    </div>

    <script>
        // 1. 유물 데이터 및 좌표 설정
        // x, y 는 지도의 좌상단 기준 퍼센트(%) 좌표 (반응형 대응)
        const mapData = [
            { id: 0, name: "안양사 귀부",       img: "images/relic_0_main.png", x: 35, y: 22 },
            { id: 1, name: "중초사지 당간지주", img: "images/relic_1_main.png", x: 50, y: 15 },
            { id: 2, name: "석수동 마애종",     img: "images/relic_2_main.png", x: 22, y: 32 },
            { id: 3, name: "만안교",            img: "images/relic_3_main.png", x: 40, y: 48 },
            { id: 4, name: "구 서이면 사무소",  img: "images/relic_4_main.png", x: 60, y: 55 },
            { id: 5, name: "석수동 석실분",     img: "images/relic_5_main.png", x: 18, y: 65 },
            { id: 6, name: "관양동 선사유적",   img: "images/relic_6_main.png", x: 75, y: 35 },
            { id: 7, name: "평촌 지석묘",       img: "images/relic_7_main.png", x: 68, y: 72 }
        ];

        // 테스트용 현재 클리어 스테이지 (0번, 1번은 완료, 2번이 목표, 3번부터 잠김 상태로 시작)
        let highestClearedStage = 1; 

        function renderMap() {
            const mapContainer = document.getElementById('interactive-map');
            
            // 기존 핀 삭제 (배경 이미지는 살림)
            const existingPins = mapContainer.querySelectorAll('.map-pin');
            existingPins.forEach(pin => pin.remove());

            // 3. 지도 위에 동적 핀(미니어처) 렌더링
            mapData.forEach((relic, index) => {
                const pin = document.createElement('div');
                
                // 상태 판별 로직
                let stateClass = 'locked';
                if (index <= highestClearedStage) {
                    stateClass = 'cleared'; // 탐험 완료 (회색)
                } else if (index === highestClearedStage + 1) {
                    stateClass = 'active';  // 현재 타겟 (컬러+애니메이션)
                }

                pin.className = `map-pin ${stateClass}`;
                pin.style.left = `${relic.x}%`;
                pin.style.top = `${relic.y}%`;
                
                pin.innerHTML = `
                    <div class="pin-img-box">
                        <img src="${relic.img}" alt="${relic.name}">
                    </div>
                    <div class="pin-label">${relic.name}</div>
                `;
                
                // 클릭 이벤트
                pin.addEventListener('click', () => {
                    if (stateClass === 'locked') {
                        alert('🔒 아직 도달할 수 없는 지역입니다.\n이전 유적의 조사를 먼저 완료해주세요.');
                    } else if (stateClass === 'cleared') {
                        if(confirm(`📘 [${relic.name}]\n이미 조사가 완료된 지역입니다. 다시 방문하시겠습니까?`)) {
                            alert(`=> ${relic.name} 스토리 모드로 이동합니다. (테스트)`);
                        }
                    } else if (stateClass === 'active') {
                        alert(`🚀 [${relic.name}] 현장 조사를 시작합니다!`);
                    }
                });

                mapContainer.appendChild(pin);
            });
        }

        // 테스트용: 다음 스테이지로 진행하는 함수
        function testAdvanceStage() {
            if(highestClearedStage < mapData.length - 1) {
                highestClearedStage++;
                renderMap();
            } else {
                alert("🎉 모든 지역을 탐험했습니다!");
                highestClearedStage = -1; // 초기화
                renderMap();
            }
        }

        // 초기 렌더링
        document.addEventListener('DOMContentLoaded', renderMap);
    </script>
</body>
</html>
